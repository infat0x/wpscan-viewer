<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WPScan Viewer — Security Dashboard</title>
<meta name="description" content="Premium WPScan output parser: CVE extraction, vulnerability analysis, modern dark UI.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --bg-base:       #0d0f14;
  --bg-surface:    #13161e;
  --bg-card:       #1a1e28;
  --bg-card-hover: #1f2433;
  --bg-input:      #111318;
  --border:        rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.12);

  --accent:        #6c63ff;
  --accent-glow:   rgba(108,99,255,0.25);
  --accent2:       #00d4aa;

  --critical:      #ff4757;
  --critical-bg:   rgba(255,71,87,0.12);
  --critical-bd:   rgba(255,71,87,0.3);

  --high:          #ff7f28;
  --high-bg:       rgba(255,127,40,0.12);
  --high-bd:       rgba(255,127,40,0.3);

  --medium:        #ffd32a;
  --medium-bg:     rgba(255,211,42,0.12);
  --medium-bd:     rgba(255,211,42,0.3);

  --low:           #2ed573;
  --low-bg:        rgba(46,213,115,0.1);
  --low-bd:        rgba(46,213,115,0.3);

  --info:          #a29bfe;

  --txt-1:  #f0f2ff;
  --txt-2:  #9ba3c0;
  --txt-3:  #5a6280;

  --mono:   'JetBrains Mono', 'Courier New', monospace;
  --ui:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --ease:   cubic-bezier(0.4, 0, 0.2, 1);

  /* Font size scale — controlled by JS */
  --fs-base:  13px;
  --fs-sm:    11px;
  --fs-xs:    10px;
  --fs-lg:    15px;
  --fs-xl:    18px;
  --fs-2xl:   24px;

  --radius:   14px;
  --radius-sm: 8px;
  --radius-xs: 5px;

  --panel-w:  42%;
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-base);
  color: var(--txt-1);
  font-family: var(--ui);
  font-size: var(--fs-base);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar {
  height: 56px;
  background: rgba(13,15,20,0.9);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 30px;
  height: 30px;
  background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  box-shadow: 0 0 16px var(--accent-glow);
  flex-shrink: 0;
}

.brand-name {
  font-size: var(--fs-lg);
  font-weight: 700;
  color: var(--txt-1);
  letter-spacing: -0.02em;
}

.brand-tag {
  font-size: var(--fs-xs);
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: rgba(108,99,255,0.15);
  color: var(--info);
  border: 1px solid rgba(108,99,255,0.25);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* Font size controls */
.fs-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 8px;
}

.fs-label {
  font-size: var(--fs-xs);
  color: var(--txt-3);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-right: 2px;
}

.fs-btn {
  width: 22px;
  height: 22px;
  border: 1px solid var(--border-strong);
  background: var(--bg-surface);
  color: var(--txt-2);
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  transition: all 0.15s var(--ease);
  line-height: 1;
}
.fs-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.fs-value {
  font-size: var(--fs-xs);
  font-weight: 700;
  color: var(--txt-1);
  font-family: var(--mono);
  min-width: 26px;
  text-align: center;
}

/* Status */
.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: var(--fs-xs);
  font-weight: 600;
  color: var(--txt-3);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
}

.dot-live {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--low);
  box-shadow: 0 0 0 0 rgba(46,213,115,0.5);
  animation: blink 2.5s ease infinite;
  flex-shrink: 0;
}
@keyframes blink {
  0%   { box-shadow: 0 0 0 0 rgba(46,213,115,0.5); }
  70%  { box-shadow: 0 0 0 5px rgba(46,213,115,0); }
  100% { box-shadow: 0 0 0 0 rgba(46,213,115,0); }
}

#status-text { color: var(--txt-2); }

/* ═══════════════════════════════════════════
   WORKSPACE SPLIT
═══════════════════════════════════════════ */
.workspace {
  display: flex;
  height: calc(100vh - 56px);
  overflow: hidden;
}

/* ── LEFT: Input Panel ── */
.input-panel {
  width: var(--panel-w);
  min-width: 220px;
  max-width: 75vw;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg-surface);
  overflow: hidden;
}

.panel-head {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-title {
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--txt-1);
  letter-spacing: -0.01em;
  margin-bottom: 3px;
}

.panel-sub {
  font-size: var(--fs-xs);
  color: var(--txt-3);
  line-height: 1.5;
}

.panel-sub kbd {
  font-family: var(--mono);
  font-size: 9px;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  padding: 1px 5px;
  color: var(--txt-2);
}

textarea#raw {
  flex: 1;
  background: var(--bg-input);
  border: none;
  color: var(--txt-2);
  font-family: var(--mono);
  font-size: var(--fs-sm);
  padding: 14px 16px;
  resize: none;
  outline: none;
  line-height: 1.75;
  width: 100%;
}
textarea#raw::placeholder { color: var(--txt-3); }

.action-row {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
  background: var(--bg-surface);
}

.btn {
  height: 34px;
  padding: 0 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: var(--ui);
  font-size: var(--fs-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s var(--ease);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  outline: none;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 0 0 0 var(--accent-glow);
}
.btn-primary:hover {
  background: #7c74ff;
  box-shadow: 0 4px 20px var(--accent-glow);
  transform: translateY(-1px);
}
.btn-primary:active { transform: scale(0.98); }

.btn-ghost {
  background: var(--bg-card);
  color: var(--txt-2);
}
.btn-ghost:hover { background: var(--bg-card-hover); color: var(--txt-1); }

.btn-outline {
  background: transparent;
  color: var(--txt-3);
  border-color: var(--border);
  margin-left: auto;
  font-size: var(--fs-xs);
}
.btn-outline:hover { background: var(--bg-card); color: var(--txt-2); border-color: var(--border-strong); }

/* Spinner */
.spin {
  width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: none;
}
.loading .spin { display: block; }
.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DIVIDER ── */
.divider {
  width: 5px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.2s;
  z-index: 10;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.divider::after {
  content: '';
  width: 2px;
  height: 28px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  transition: all 0.2s;
}
.divider:hover, .divider.dragging { background: rgba(108,99,255,0.2); }
.divider:hover::after, .divider.dragging::after { height: 44px; background: var(--accent); }

/* ── RIGHT: Output Panel ── */
.output-panel {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 0;
  background: var(--bg-base);
}

/* ═══════════════════════════════════════════
   PLACEHOLDER
═══════════════════════════════════════════ */
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
  color: var(--txt-3);
  text-align: center;
  animation: fadeUp 0.4s var(--ease);
}

.placeholder-icon {
  width: 72px; height: 72px;
  border-radius: 22px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.placeholder h2 {
  font-size: var(--fs-xl);
  font-weight: 700;
  color: var(--txt-1);
  letter-spacing: -0.02em;
}

.placeholder p { font-size: var(--fs-sm); line-height: 1.7; max-width: 300px; }

/* ═══════════════════════════════════════════
   TARGET BAR
═══════════════════════════════════════════ */
.target-bar {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeUp 0.3s var(--ease);
}

.target-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--low);
  box-shadow: 0 0 0 3px rgba(46,213,115,0.2);
  flex-shrink: 0;
  animation: blink 2.5s ease infinite;
}

.target-url {
  font-family: var(--mono);
  font-size: var(--fs-sm);
  color: var(--txt-1);
  font-weight: 500;
}

.target-wp {
  margin-left: auto;
  font-size: var(--fs-xs);
  font-weight: 700;
  color: var(--txt-2);
  background: var(--bg-surface);
  border: 1px solid var(--border-strong);
  border-radius: 20px;
  padding: 3px 10px;
  font-family: var(--mono);
}

/* ═══════════════════════════════════════════
   SUMMARY CARDS
═══════════════════════════════════════════ */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  animation: fadeUp 0.35s var(--ease);
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px 14px;
  text-align: center;
  cursor: default;
  transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
  pointer-events: none;
}

.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  background: var(--bg-card-hover);
}

.stat-num {
  font-size: var(--fs-2xl);
  font-weight: 800;
  line-height: 1;
  margin-bottom: 6px;
  letter-spacing: -0.03em;
}

.stat-lbl {
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--txt-3);
}

.c-total   { border-top: 2px solid rgba(255,255,255,0.2); }
.c-critical { border-top: 2px solid var(--critical); }
.c-high    { border-top: 2px solid var(--high); }
.c-medium  { border-top: 2px solid var(--medium); }
.c-low     { border-top: 2px solid var(--low); }

.c-total   .stat-num { color: var(--txt-1); }
.c-critical .stat-num { color: var(--critical); }
.c-high    .stat-num { color: var(--high); }
.c-medium  .stat-num { color: var(--medium); }
.c-low     .stat-num { color: var(--low); }

/* ═══════════════════════════════════════════
   SECTION CARDS
═══════════════════════════════════════════ */
.section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.4s var(--ease);
}

.sec-header {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.sec-header:hover { background: rgba(255,255,255,0.03); }

.sec-title {
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--txt-1);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.01em;
}

.sec-icon { font-size: var(--fs-base); }

.cnt {
  background: var(--bg-surface);
  color: var(--txt-2);
  font-size: var(--fs-xs);
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--border-strong);
}

.chev {
  color: var(--txt-3);
  font-size: var(--fs-xs);
  transition: transform 0.2s var(--ease);
  width: 18px; height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 5px;
}
.chev.open { transform: rotate(180deg); }

.sec-body { display: none; }
.sec-body.open { display: block; }

/* ═══════════════════════════════════════════
   FILTER + SEARCH
═══════════════════════════════════════════ */
.filter-bar {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  background: rgba(13,15,20,0.5);
}

.filter-lbl {
  font-size: var(--fs-xs);
  font-weight: 700;
  color: var(--txt-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-right: 2px;
}

.fb {
  font-size: var(--fs-xs);
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border-strong);
  background: transparent;
  color: var(--txt-2);
  cursor: pointer;
  transition: all 0.15s var(--ease);
  font-family: var(--ui);
}
.fb:hover { background: var(--bg-surface); color: var(--txt-1); }
.fb.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.fb-critical { color: var(--critical); border-color: var(--critical-bd); }
.fb-critical.active { background: var(--critical); color: #fff; border-color: var(--critical); }
.fb-high { color: var(--high); border-color: var(--high-bd); }
.fb-high.active { background: var(--high); color: #fff; border-color: var(--high); }
.fb-medium { color: var(--medium); border-color: var(--medium-bd); }
.fb-medium.active { background: var(--medium); color: #000; border-color: var(--medium); }
.fb-low { color: var(--low); border-color: var(--low-bd); }
.fb-low.active { background: var(--low); color: #000; border-color: var(--low); }
.fb-unauth { color: var(--info); border-color: rgba(162,155,254,0.3); }
.fb-unauth.active { background: var(--info); color: #000; border-color: var(--info); }

.filter-count {
  margin-left: auto;
  font-size: var(--fs-xs);
  color: var(--txt-3);
  font-weight: 600;
}

.search-bar {
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(13,15,20,0.3);
}

.search-input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  color: var(--txt-1);
  font-family: var(--ui);
  font-size: var(--fs-sm);
  padding: 7px 12px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input::placeholder { color: var(--txt-3); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

/* ═══════════════════════════════════════════
   VULN ITEMS
═══════════════════════════════════════════ */
.vuln-item {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.vuln-item:last-child { border-bottom: none; }
.vuln-item:hover { background: rgba(255,255,255,0.02); }

.vuln-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}

.sev {
  font-size: 9px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: var(--radius-xs);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  white-space: nowrap;
  margin-top: 1px;
  flex-shrink: 0;
}
.sev-critical { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical-bd); }
.sev-high     { background: var(--high-bg);     color: var(--high);     border: 1px solid var(--high-bd); }
.sev-medium   { background: var(--medium-bg);   color: var(--medium);   border: 1px solid var(--medium-bd); }
.sev-low      { background: var(--low-bg);      color: var(--low);      border: 1px solid var(--low-bd); }

.vtitle {
  font-size: var(--fs-sm);
  font-weight: 500;
  color: var(--txt-1);
  line-height: 1.55;
  letter-spacing: -0.01em;
}

.vuln-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 6px;
}

.cve-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 6px;
  align-items: center;
}

.cve-lbl {
  font-size: 9px;
  font-weight: 700;
  color: var(--txt-3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.cve-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: var(--fs-xs);
  font-weight: 700;
  font-family: var(--mono);
  padding: 3px 9px;
  border-radius: var(--radius-xs);
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-strong);
  color: var(--txt-2);
  text-decoration: none;
  transition: all 0.15s;
  cursor: pointer;
}
.cve-tag:hover { background: rgba(255,255,255,0.1); color: var(--txt-1); border-color: rgba(255,255,255,0.2); }

.poc-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 800;
  padding: 3px 9px;
  border-radius: var(--radius-xs);
  background: var(--critical-bg);
  border: 1px solid var(--critical-bd);
  color: var(--critical);
  text-decoration: none;
  transition: all 0.15s;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.poc-btn:hover { background: rgba(255,71,87,0.22); transform: translateY(-1px); }

.mtag {
  display: inline-flex;
  align-items: center;
  font-size: var(--fs-xs);
  color: var(--txt-3);
  background: var(--bg-surface);
  padding: 2px 9px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  gap: 4px;
}
.mtag a { color: inherit; text-decoration: none; transition: color 0.12s; }
.mtag a:hover { color: var(--txt-1); }

.tag-fixed { background: var(--low-bg); color: var(--low); border-color: var(--low-bd); }
.tag-plugin { background: rgba(108,99,255,0.1); color: var(--info); border-color: rgba(108,99,255,0.25); }

/* .tag-wpscan and .tag-ref inherit from .mtag */

/* ═══════════════════════════════════════════
   PLUGIN ACCORDION
═══════════════════════════════════════════ */
.plugin-item { border-bottom: 1px solid var(--border); }
.plugin-item:last-child { border-bottom: none; }

.plugin-header {
  padding: 11px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: background 0.12s;
}
.plugin-header:hover { background: rgba(255,255,255,0.02); }

.plugin-info { display: flex; align-items: center; gap: 8px; }

.plugin-name {
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--info);
  font-family: var(--mono);
}

.plugin-ver {
  font-size: var(--fs-xs);
  color: var(--txt-3);
  font-family: var(--mono);
}

.plugin-right { display: flex; align-items: center; gap: 8px; }

.vuln-count {
  font-size: var(--fs-xs);
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 20px;
  border: 1px solid var(--critical-bd);
  background: var(--critical-bg);
  color: var(--critical);
}
.vuln-count.zero {
  border-color: var(--border);
  background: var(--bg-surface);
  color: var(--txt-3);
}

.plugin-body { display: none; border-top: 1px solid var(--border); }
.plugin-body.open { display: block; }

/* ═══════════════════════════════════════════
   MISC ITEMS
═══════════════════════════════════════════ */
.finding-item {
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  font-size: var(--fs-sm);
  color: var(--txt-2);
  line-height: 1.65;
  display: flex;
  align-items: flex-start;
  gap: 9px;
}
.finding-item:last-child { border-bottom: none; }
.finding-item::before { content: '›'; color: var(--txt-3); flex-shrink: 0; margin-top: 1px; }

.user-item {
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  font-size: var(--fs-sm);
  color: var(--medium);
  font-family: var(--mono);
  display: flex;
  align-items: center;
  gap: 9px;
}
.user-item:last-child { border-bottom: none; }
.user-item::before { content: '⚠'; font-style: normal; }

.empty-msg {
  padding: 22px;
  text-align: center;
  color: var(--txt-3);
  font-size: var(--fs-sm);
}

/* ═══════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 720px) {
  .workspace { flex-direction: column; }
  .input-panel { width: 100% !important; max-width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); height: 38vh; }
  .divider { display: none; }
  .summary-grid { grid-template-columns: repeat(3, 1fr); }
  .fs-controls { display: none; }
}
</style>
</head>
<body>

<!-- ── Topbar ── -->
<header class="topbar">
  <div class="brand">
    <div class="brand-icon">🛡</div>
    <span class="brand-name">WPScan Viewer</span>
  </div>
  <span class="brand-tag">OSCP Helper</span>

  <!-- Font Size Controls -->
  <div class="fs-controls">
    <span class="fs-label">Font</span>
    <button class="fs-btn" id="fsDown" title="Decrease font size">−</button>
    <span class="fs-value" id="fsVal">13</span>
    <button class="fs-btn" id="fsUp" title="Increase font size">+</button>
  </div>

  <div class="topbar-right">
    <div class="status-pill">
      <div class="dot-live"></div>
      <span id="status-text">Ready</span>
    </div>
  </div>
</header>

<!-- ── Workspace ── -->
<div class="workspace" id="workspace">

  <!-- Left: Input -->
  <div class="input-panel" id="inputPanel" style="width:42%">
    <div class="panel-head">
      <div class="panel-title">WPScan Output</div>
      <div class="panel-sub">Paste raw output — dashboard updates live. <kbd>Ctrl+Enter</kbd> to analyze</div>
    </div>
    <textarea id="raw" spellcheck="false" autocomplete="off"
      placeholder="Paste your WPScan output here...&#10;&#10;Example:&#10;wpscan --url http://target --enumerate vp --api-token TOKEN&#10;&#10;The dashboard updates automatically."></textarea>
    <div class="action-row">
      <button class="btn btn-primary" id="analyzeBtn" onclick="go()">
        <div class="spin"></div>
        <span class="btn-text">⚡ Analyze</span>
      </button>
      <button class="btn btn-ghost" onclick="clr()">Clear</button>
      <button class="btn btn-outline" onclick="loadExample()">Load Example</button>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider" id="divider"></div>

  <!-- Right: Output -->
  <div class="output-panel" id="out">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">🔍</div>
      <h2>Security Dashboard</h2>
      <p>Paste your WPScan output on the left. Vulnerabilities, CVEs, plugins &amp; users will appear here in real-time.</p>
      <p style="margin-top:6px;font-size:10px;color:var(--txt-3)"><kbd style="font-family:var(--mono);background:var(--bg-card);border:1px solid var(--border-strong);border-radius:4px;padding:2px 6px;color:var(--txt-2)">Ctrl+Enter</kbd> to analyze instantly</p>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   FONT SIZE CONTROL
══════════════════════════════════════ */
let currentFs = parseInt(localStorage.getItem('wpscan-fs') || '13');

function applyFs(size) {
  size = Math.max(10, Math.min(20, size));
  currentFs = size;
  document.documentElement.style.setProperty('--fs-base', size + 'px');
  document.documentElement.style.setProperty('--fs-sm',   (size - 2) + 'px');
  document.documentElement.style.setProperty('--fs-xs',   (size - 3) + 'px');
  document.documentElement.style.setProperty('--fs-lg',   (size + 2) + 'px');
  document.documentElement.style.setProperty('--fs-xl',   (size + 5) + 'px');
  document.documentElement.style.setProperty('--fs-2xl',  (size + 11) + 'px');
  document.getElementById('fsVal').textContent = size;
  localStorage.setItem('wpscan-fs', size);
}

document.getElementById('fsUp').addEventListener('click', () => applyFs(currentFs + 1));
document.getElementById('fsDown').addEventListener('click', () => applyFs(currentFs - 1));
applyFs(currentFs);

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let ALL_VULNS      = [];
let ACTIVE_FILTERS = new Set();
let SEARCH_TERM    = '';
let debounceTimer  = null;

/* ══════════════════════════════════════
   DIVIDER DRAG
══════════════════════════════════════ */
(function() {
  const divider   = document.getElementById('divider');
  const workspace = document.getElementById('workspace');
  const panel     = document.getElementById('inputPanel');
  let dragging = false, startX, startW;

  divider.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startW = panel.offsetWidth;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newW = Math.max(220, Math.min(startW + e.clientX - startX, workspace.offsetWidth * 0.8));
    panel.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

/* ══════════════════════════════════════
   DEBOUNCED REALTIME PARSE
══════════════════════════════════════ */
document.getElementById('raw').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const raw = document.getElementById('raw').value.trim();
    if (raw.length > 100) go();
  }, 450);
});

/* ══════════════════════════════════════
   CORE ACTIONS
══════════════════════════════════════ */
function go() {
  const raw = document.getElementById('raw').value.trim();
  if (!raw) return;
  const btn = document.getElementById('analyzeBtn');
  btn.classList.add('loading');
  setStatus('Analyzing…');

  fetch('/parse', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ raw })
  })
  .then(r => r.json())
  .then(data => { btn.classList.remove('loading'); render(data); setStatus('Analysis complete'); })
  .catch(err => { btn.classList.remove('loading'); setStatus('Error — check console'); console.error(err); });
}

function clr() {
  document.getElementById('raw').value = '';
  ALL_VULNS = []; ACTIVE_FILTERS.clear(); SEARCH_TERM = '';
  setStatus('Ready');
  document.getElementById('out').innerHTML = `
    <div class="placeholder">
      <div class="placeholder-icon">🔍</div>
      <h2>Security Dashboard</h2>
      <p>Paste your WPScan output on the left to get started.</p>
    </div>`;
}

function loadExample() {
  fetch('/example')
    .then(r => r.text())
    .then(txt => { document.getElementById('raw').value = txt; go(); })
    .catch(() => setStatus('Could not load example'));
}

function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
}

/* ══════════════════════════════════════
   FILTER LOGIC
══════════════════════════════════════ */
function toggleFilter(sev, btn) {
  if (sev === 'all') {
    ACTIVE_FILTERS.clear();
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  } else {
    document.querySelector('.fb[data-sev="all"]')?.classList.remove('active');
    if (ACTIVE_FILTERS.has(sev)) { ACTIVE_FILTERS.delete(sev); btn.classList.remove('active'); }
    else { ACTIVE_FILTERS.add(sev); btn.classList.add('active'); }
    if (ACTIVE_FILTERS.size === 0) document.querySelector('.fb[data-sev="all"]')?.classList.add('active');
  }
  applyFilters();
}

function applyFilters() {
  let f = ALL_VULNS;
  if (ACTIVE_FILTERS.size > 0) {
    f = f.filter(v => {
      if (ACTIVE_FILTERS.has('unauthenticated') && v.title.toLowerCase().includes('unauthenticated')) return true;
      if (ACTIVE_FILTERS.has(v.severity)) return true;
      return false;
    });
  }
  if (SEARCH_TERM) {
    const q = SEARCH_TERM.toLowerCase();
    f = f.filter(v =>
      v.title.toLowerCase().includes(q) ||
      (v.plugin && v.plugin.toLowerCase().includes(q)) ||
      (v.cves && v.cves.some(c => c.id.toLowerCase().includes(q)))
    );
  }
  const container = document.getElementById('vb');
  if (container) {
    container.innerHTML = renderVulns(f);
    const fc = document.getElementById('filter-count');
    if (fc) fc.textContent = `${f.length} shown`;
  }
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render(d) {
  ALL_VULNS = d.vulnerabilities || [];
  ACTIVE_FILTERS.clear(); SEARCH_TERM = '';
  const s = d.summary;
  let h = '';

  // Target
  if (d.target) {
    h += `<div class="target-bar">
      <div class="target-dot"></div>
      <span class="target-url">${esc(d.target)}</span>
      ${d.wordpress_version ? `<span class="target-wp">WP ${esc(d.wordpress_version)}</span>` : ''}
    </div>`;
  }

  // Summary
  h += `<div class="summary-grid">
    <div class="stat-card c-total"><div class="stat-num">${s.total_vulns}</div><div class="stat-lbl">Total</div></div>
    <div class="stat-card c-critical"><div class="stat-num">${s.critical}</div><div class="stat-lbl">Critical</div></div>
    <div class="stat-card c-high"><div class="stat-num">${s.high}</div><div class="stat-lbl">High</div></div>
    <div class="stat-card c-medium"><div class="stat-num">${s.medium}</div><div class="stat-lbl">Medium</div></div>
    <div class="stat-card c-low"><div class="stat-num">${s.low}</div><div class="stat-lbl">Low</div></div>
  </div>`;

  // Vulnerabilities
  if (ALL_VULNS.length > 0) {
    h += `<div class="section">
      <div class="sec-header" onclick="tog('vb','vc')">
        <div class="sec-title"><span class="sec-icon">⚠</span> All Vulnerabilities <span class="cnt">${ALL_VULNS.length}</span></div>
        <div class="chev open" id="vc">▾</div>
      </div>
      <div class="filter-bar">
        <span class="filter-lbl">Filter</span>
        <button class="fb active" data-sev="all" onclick="toggleFilter('all',this)">All</button>
        <button class="fb fb-critical" data-sev="critical" onclick="toggleFilter('critical',this)">Critical</button>
        <button class="fb fb-high" data-sev="high" onclick="toggleFilter('high',this)">High</button>
        <button class="fb fb-medium" data-sev="medium" onclick="toggleFilter('medium',this)">Medium</button>
        <button class="fb fb-low" data-sev="low" onclick="toggleFilter('low',this)">Low</button>
        <button class="fb fb-unauth" data-sev="unauthenticated" onclick="toggleFilter('unauthenticated',this)">Unauth</button>
        <span class="filter-count" id="filter-count">${ALL_VULNS.length} shown</span>
      </div>
      <div class="search-bar">
        <input class="search-input" id="vuln-search" type="text" placeholder="🔍  Search by title, plugin, CVE…" oninput="SEARCH_TERM=this.value.trim();applyFilters()">
      </div>
      <div class="sec-body open" id="vb">${renderVulns(ALL_VULNS)}</div>
    </div>`;
  }

  // Plugins
  if (d.plugins && d.plugins.length > 0) {
    const plugHtml = d.plugins.map((p, idx) => {
      const pid = 'p' + idx;
      const vc  = p.vulns ? p.vulns.length : 0;
      return `<div class="plugin-item">
        <div class="plugin-header" onclick="togP('${pid}',${idx})">
          <div class="plugin-info">
            <span class="plugin-name">${esc(p.name)}</span>
            ${p.version ? `<span class="plugin-ver">v${esc(p.version)}</span>` : ''}
          </div>
          <div class="plugin-right">
            <span class="vuln-count${vc === 0 ? ' zero' : ''}">${vc} vuln${vc !== 1 ? 's' : ''}</span>
            <div class="chev" id="pc${idx}">▾</div>
          </div>
        </div>
        <div class="plugin-body" id="${pid}">
          ${vc > 0 ? renderVulns(p.vulns) : '<div class="empty-msg">No vulnerabilities found.</div>'}
        </div>
      </div>`;
    }).join('');
    h += `<div class="section">
      <div class="sec-header" onclick="tog('pb','pch')">
        <div class="sec-title"><span class="sec-icon">🧩</span> Plugins <span class="cnt">${d.plugins.length}</span></div>
        <div class="chev" id="pch">▾</div>
      </div>
      <div class="sec-body" id="pb">${plugHtml}</div>
    </div>`;
  }

  // Interesting Findings
  if (d.interesting_findings && d.interesting_findings.length > 0) {
    h += `<div class="section">
      <div class="sec-header" onclick="tog('fb2','fc2')">
        <div class="sec-title"><span class="sec-icon">🔎</span> Interesting Findings <span class="cnt">${d.interesting_findings.length}</span></div>
        <div class="chev" id="fc2">▾</div>
      </div>
      <div class="sec-body" id="fb2">
        ${d.interesting_findings.map(f => `<div class="finding-item">${esc(f)}</div>`).join('')}
      </div>
    </div>`;
  }

  // Users
  if (d.users && d.users.length > 0) {
    h += `<div class="section">
      <div class="sec-header" onclick="tog('ub','uc')">
        <div class="sec-title"><span class="sec-icon">👤</span> Users Found <span class="cnt">${d.users.length}</span></div>
        <div class="chev open" id="uc">▾</div>
      </div>
      <div class="sec-body open" id="ub">
        ${d.users.map(u => `<div class="user-item">${esc(u)}</div>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('out').innerHTML = h || '<div class="placeholder"><div class="placeholder-icon">⚠</div><h2>No results</h2><p>Could not parse the output. Make sure you paste the full WPScan output.</p></div>';
}

/* ══════════════════════════════════════
   RENDER VULNS
══════════════════════════════════════ */
function renderVulns(vulns) {
  if (!vulns || vulns.length === 0)
    return '<div class="empty-msg">No vulnerabilities found.</div>';

  return vulns.map(v => {
    const sev  = v.severity || 'low';
    const refs = (v.references || []).slice(0, 4).map(r => {
      const isCve    = r.includes('cve.mitre') || r.includes('nvd.nist');
      const isWpscan = r.includes('wpscan');
      const isPoc    = r.includes('exploit') || r.includes('github') || r.includes('poc');
      const label    = isCve ? '🔗 CVE' : isWpscan ? '📋 WPScan' : isPoc ? '💥 PoC' : '🌐 Ref';
      const cls      = isPoc ? 'poc-btn' : 'mtag tag-ref';
      return `<a class="${cls}" href="${esc(r)}" target="_blank" rel="noopener">${label}</a>`;
    }).join('');

    const fi   = v.fixed_in ? `<span class="mtag tag-fixed">✓ Fixed in ${esc(v.fixed_in)}</span>` : '';
    const plug = v.plugin && v.plugin !== 'WordPress Core'
      ? `<span class="mtag tag-plugin">🧩 ${esc(v.plugin)}</span>` : '';
    const core = v.plugin === 'WordPress Core' ? `<span class="mtag">🔧 WordPress Core</span>` : '';

    return `<div class="vuln-item" data-sev="${sev}">
      <div class="vuln-top">
        <span class="sev sev-${sev}">${sev}</span>
        <span class="vtitle">${esc(v.title)}</span>
      </div>
      <div class="vuln-meta">${fi}${plug}${core}${refs}</div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   ACCORDION HELPERS
══════════════════════════════════════ */
function tog(bodyId, chevId) {
  const b = document.getElementById(bodyId);
  const c = document.getElementById(chevId);
  if (!b) return;
  b.classList.toggle('open');
  if (c) c.classList.toggle('open');
}

function togP(pid, idx) {
  const b = document.getElementById(pid);
  if (!b) return;
  b.classList.toggle('open');
  const c = document.getElementById('pc' + idx);
  if (c) c.classList.toggle('open');
}

/* ══════════════════════════════════════
   ESCAPE HTML
══════════════════════════════════════ */
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ══════════════════════════════════════
   KEYBOARD SHORTCUT
══════════════════════════════════════ */
document.getElementById('raw').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') go();
});
</script>
</body>
</html>
